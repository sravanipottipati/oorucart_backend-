{% extends "admin/change_list.html" %}
{% block object-tools-items %}
<li>
    <div style="background:#1e293b;padding:12px 16px;border-radius:8px;margin-bottom:10px;">
        <p style="color:white;font-weight:bold;margin-bottom:8px;font-size:14px;">📊 Download GST Excel Report</p>
        <form method="get" action="export-excel/" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <select name="month" style="padding:6px 10px;border-radius:6px;border:none;font-size:13px;">
                {% for m in export_months %}
                <option value="{{ m.month }}" data-year="{{ m.year }}" {% if m.month == current_month %}selected{% endif %}>{{ m.label }}</option>
                {% endfor %}
            </select>
            <input type="hidden" name="year" id="year-input" value="{{ current_year }}">
            <button type="submit" style="background:#2563eb;color:white;padding:6px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;">⬇ Download Excel</button>
        </form>
    </div>
</li>
{{ block.super }}
{% endblock %}

{% block extrahead %}
{{ block.super }}
<script>
document.querySelector("select[name=month]").addEventListener("change", function() {
    var opt = this.options[this.selectedIndex];
    document.getElementById("year-input").value = opt.getAttribute("data-year");
});
</script>
{% endblock %}
